    <!-- Dynamic Icon Generation (Emerald Co-MYAKU Balance) -->
    <script>
        const createIcon = () => {
            const svg = `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
                <rect width="512" height="512" rx="112" fill="#FFFFFF"/>
                <circle cx="256" cy="256" r="210" fill="#00A59E"/>
                <circle cx="340" cy="180" r="89.25" fill="white"/>
                <circle cx="365" cy="165" r="39.27" fill="#0068B7"/>
            </svg>`;
            return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
        };
        const iconUrl = createIcon();
        const link = document.createElement('link');
        link.rel = 'icon'; link.href = iconUrl;
        document.head.appendChild(link);
        const appleLink = document.createElement('link');
        appleLink.rel = 'apple-touch-icon'; appleLink.href = iconUrl;
        document.head.appendChild(appleLink);
        const manifest = {
            "name": "こみゃくのもり", "short_name": "こみゃくのもり",
            "start_url": ".", "display": "standalone",
            "background_color": "#FFFFFF", "theme_color": "#00A59E",
            "icons": [{ "src": iconUrl, "sizes": "512x512", "type": "image/svg+xml" }]
        };
        const manifestStr = JSON.stringify(manifest);
        const manifestBlob = new Blob([manifestStr], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest'; manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);
    </script>

<script>
/* ── Settings ── */
const BPM_BASE = 120;
const STEP_4TH_BASE = (60000 / BPM_BASE); 
const ECHO_DOTTED_8TH = (STEP_4TH_BASE / 2) * 1.5; 

const INITIAL_UI_PERCENT = 70.0;

const PALETTE = {
    BLUE:       '#0068B7',
    GREEN_VIVID:'#99C41E',
    EMERALD:    '#00A59E',
    GREEN_SOFT: '#C9E0B8',
    YELLOW:     '#D9DE00',
    WHITE:      '#FFFFFF'
};

const GREEN_SET = [PALETTE.GREEN_VIVID, PALETTE.EMERALD, PALETTE.GREEN_SOFT, PALETTE.YELLOW];
const BASE_BODY_R = 40;
const MIN_MARGIN = 15; 

const MASTER_SCALE = [40, 47, 52, 56, 59, 64, 66, 68, 71, 73, 76];

/* ── AUDIO STATE ── */
let isMasterPlaying = false;
const audioState = {
    tempoScale: 1.0,
    arpeggioMuted: false, 
    choirMuted: false    
};

/* ── SOUND ENGINE ── */

const CHOIR_SETTINGS = {
    clarity: 0.99,      
    instability: 0,     
    breath: 4,          
    numVoices: 1        
};

class BirdChirpEngine {
    constructor(audioCtx, destination) {
        this.ctx = audioCtx;
        this.destination = destination;
        this.musicalNotes = [88, 91, 93, 95, 98, 100]; 
    }
    playChirp(time, count = 1) {
        if (audioState.arpeggioMuted) return;

        const startTime = time || this.ctx.currentTime;
        for (let i = 0; i < count; i++) {
            const now = startTime + (i * 0.12);
            const startMidi = this.musicalNotes[Math.floor(Math.random() * this.musicalNotes.length)];
            let endMidi = startMidi + (Math.random() > 0.5 ? 2 : -2);
            if (!this.musicalNotes.includes(endMidi)) endMidi = startMidi;

            const baseFreq = 440 * Math.pow(2, (startMidi - 69) / 12);
            const freqEnd = 440 * Math.pow(2, (endMidi - 69) / 12);
            
            const carrier = this.ctx.createOscillator();
            const modulator = this.ctx.createOscillator();
            const modGain = this.ctx.createGain();
            const chirpGain = this.ctx.createGain();
            const duration = 0.07 + Math.random() * 0.05;

            carrier.frequency.setValueAtTime(baseFreq, now);
            carrier.frequency.exponentialRampToValueAtTime(freqEnd, now + duration);
            
            modulator.frequency.value = 60 + Math.random() * 60;
            modGain.gain.value = 160 + Math.random() * 100;
            modulator.connect(modGain).connect(carrier.frequency);
            
            chirpGain.gain.setValueAtTime(0, now);
            chirpGain.gain.linearRampToValueAtTime(0.02, now + 0.01);
            chirpGain.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            carrier.connect(chirpGain).connect(this.destination);
            modulator.start(now); carrier.start(now);
            modulator.stop(now + duration); carrier.stop(now + duration);
        }
    }
}

class GuitarArpeggioEngine {
    constructor(audioCtx, destination) {
        this.ctx = audioCtx;
        this.notes5 = [52, 59, 64, 68, 71]; 
        this.notes7 = [28, 47, 52, 56, 59, 64, 66];
        this.gainNode = this.ctx.createGain();
        this.gainNode.gain.value = 0.3;
        this.gainNode.connect(destination);
    }
    evolve() {
        const targetArray = Math.random() > 0.5 ? this.notes5 : this.notes7;
        const idx = Math.floor(Math.random() * targetArray.length);
        const currentNote = targetArray[idx];
        if ([28, 40, 52, 64, 76].includes(currentNote)) return;
        targetArray[idx] = MASTER_SCALE[Math.floor(Math.random() * MASTER_SCALE.length)];
    }
    playNote(midi, pan = 0) {
        if (audioState.arpeggioMuted) return null;

        const now = this.ctx.currentTime;
        const freq = 440 * Math.pow(2, (midi - 69) / 12);
        const mainGain = this.ctx.createGain();
        const panner = this.ctx.createStereoPanner();
        panner.pan.value = pan;
        const attack = 0.05; 
        const decay = 2.5; 
        
        [1, 2, 4].forEach((h) => {
            const osc = this.ctx.createOscillator();
            const g = this.ctx.createGain();
            osc.frequency.setValueAtTime(freq * h, now);
            g.gain.setValueAtTime(0, now);
            g.gain.linearRampToValueAtTime(0.06 / h, now + attack);
            g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
            osc.connect(g).connect(mainGain);
            osc.onended = () => { g.disconnect(); };
            osc.start(now); osc.stop(now + decay + 0.1);
        });

        const filter = this.ctx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(freq * 2.8, now);
        filter.frequency.exponentialRampToValueAtTime(freq * 0.4, now + decay);
        
        mainGain.connect(filter).connect(panner).connect(this.gainNode);
        return freq;
    }
}

class SanctuaryEngine {
    constructor() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.mixerAmb = this.ctx.createGain(); 
        this.mixerAmb.gain.value = 2.0;
        const ambHPF = this.ctx.createBiquadFilter();
        ambHPF.type = 'highpass'; ambHPF.frequency.value = 250;
        
        this.delay = this.ctx.createDelay(2.0);
        this.delay.delayTime.value = ECHO_DOTTED_8TH / 1000; 
        this.delayFeedback = this.ctx.createGain();
        this.delayFeedback.gain.value = 0.55; 
        this.delay.connect(this.delayFeedback).connect(this.delay);
        
        this.convolver = this.ctx.createConvolver();
        this.reverbGain = this.ctx.createGain();
        this.reverbGain.gain.value = 5.0;
        this.generateIR();
        this.convolver.connect(this.reverbGain);
        
        this.masterOut = this.ctx.createGain();
        this.masterOut.gain.value = (INITIAL_UI_PERCENT / 100); 
        this.masterOut.connect(this.ctx.destination);
        
        this.guitar = new GuitarArpeggioEngine(this.ctx, this.masterOut); 
        this.birds = new BirdChirpEngine(this.ctx, this.convolver); 
        
        this.mixerAmb.connect(ambHPF).connect(this.masterOut);
        ambHPF.connect(this.delay); ambHPF.connect(this.convolver);
        this.guitar.gainNode.connect(this.delay); this.guitar.gainNode.connect(this.convolver);
        this.delay.connect(this.masterOut); this.reverbGain.connect(this.masterOut);
        
        this.noiseBuffer = this.makeNoiseBuffer(5);
        this.beatCount = 0;
        this.currentIdx5 = 0; this.currentIdx7 = 0;
        this.tickTimeout = null;
    }
    
    makeNoiseBuffer(sec) {
        const sr = this.ctx.sampleRate;
        const buf = this.ctx.createBuffer(1, sr * sec, sr);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        return buf;
    }

    generateIR() {
        const length = this.ctx.sampleRate * 5.0;
        const buffer = this.ctx.createBuffer(2, length, this.ctx.sampleRate);
        for (let c = 0; c < 2; c++) {
            const data = buffer.getChannelData(c);
            for (let i = 0; i < length; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, 5.0);
            }
        }
        this.convolver.buffer = buffer;
    }

    createChoirVoice(freq, startTime, duration, target) {
        const osc = this.ctx.createOscillator();
        osc.type = 'sawtooth';
        osc.frequency.value = freq;

        const preEmph = this.ctx.createBiquadFilter();
        preEmph.type = 'highshelf';
        preEmph.frequency.value = 1000;
        preEmph.gain.value = -6;
        osc.connect(preEmph);

        const vibLFO = this.ctx.createOscillator();
        const vibAmt = this.ctx.createGain();
        vibLFO.frequency.value = 0.5;
        const vibDepth = freq * 0.004;
        vibAmt.gain.setValueAtTime(vibDepth, startTime);
        vibLFO.connect(vibAmt);
        vibAmt.connect(osc.frequency);

        const formantDefs = [
            { cf: 850,  bw: 95,  g: 0.6435 },
            { cf: 1400, bw: 105, g: 0.4158 },
            { cf: 2750, bw: 140, g: 0.2178 },
            { cf: 3500, bw: 220, g: 0.0990 },
        ];

        const voiceOut = this.ctx.createGain();
        voiceOut.gain.setValueAtTime(0, startTime);
        voiceOut.gain.linearRampToValueAtTime(0.14, startTime + 0.8);
        voiceOut.gain.setValueAtTime(0.14, startTime + duration - 0.8);
        voiceOut.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        formantDefs.forEach(fd => {
            const filt = this.ctx.createBiquadFilter();
            filt.type = 'bandpass';
            filt.frequency.value = fd.cf;
            filt.Q.value = fd.cf / fd.bw;
            const fgain = this.ctx.createGain();
            fgain.gain.value = fd.g;
            preEmph.connect(filt);
            filt.connect(fgain);
            fgain.connect(voiceOut);
        });

        voiceOut.connect(target);
        osc.onended = () => { voiceOut.disconnect(); preEmph.disconnect(); };
        vibLFO.onended = () => { vibAmt.disconnect(); };
        osc.start(startTime);
        osc.stop(startTime + duration + 0.1);
        vibLFO.start(startTime);
        vibLFO.stop(startTime + duration + 0.1);
    }

    createBreath(startTime, duration, target) {
        if (CHOIR_SETTINGS.breath < 1) return;
        const src = this.ctx.createBufferSource();
        src.buffer = this.noiseBuffer;
        src.loop = true;
        const nEnv = this.ctx.createGain();
        nEnv.gain.setValueAtTime(0, startTime);
        nEnv.gain.linearRampToValueAtTime(CHOIR_SETTINGS.breath * 0.0012, startTime + 0.8);
        nEnv.gain.setValueAtTime(CHOIR_SETTINGS.breath * 0.0012, startTime + duration - 0.8);
        nEnv.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);

        [{ cf: 850, bw: 200 }, { cf: 1400, bw: 250 }, { cf: 2750, bw: 350 }].forEach(fd => {
            const filt = this.ctx.createBiquadFilter();
            filt.type = 'bandpass';
            filt.frequency.value = fd.cf;
            filt.Q.value = fd.cf / fd.bw;
            const fg = this.ctx.createGain();
            fg.gain.value = 0.5;
            src.connect(filt);
            filt.connect(fg);
            fg.connect(nEnv);
        });

        nEnv.connect(target);
        src.onended = () => { nEnv.disconnect(); };
        src.start(startTime);
        src.stop(startTime + duration + 0.4);
    }

    spawnOrganicSound(freq, pan = 0, richness = 1.0) {
        if (audioState.choirMuted) return;

        const now = this.ctx.currentTime;
        const duration = 5.0 + Math.random() * 1.5; 
        
        const panner = this.ctx.createStereoPanner();
        panner.pan.value = pan;
        
        const localGain = this.ctx.createGain();
        localGain.gain.value = richness * 1.2; 

        localGain.connect(panner).connect(this.mixerAmb);
        
        for (let i = 0; i < CHOIR_SETTINGS.numVoices; i++) {
            this.createChoirVoice(freq, now, duration, localGain);
        }
        this.createBreath(now, duration, localGain);
    }

    playChordSequence(notes) {
        if (!isMasterPlaying || audioState.choirMuted) return;
        const noteCount = 2 + Math.floor(Math.random() * (notes.length - 1));
        const activeNotes = notes.slice(0, noteCount);
        activeNotes.forEach((midi, i) => {
            const jitter = Math.random() * 200; 
            const delayTime = i * (STEP_4TH_BASE * 1.5) + jitter; 
            setTimeout(() => {
                if (!isMasterPlaying || audioState.choirMuted) return;
                const freq = 440 * Math.pow(2, (midi - 69) / 12);
                const obs = createObserverAtRandom(freq);
                if (obs) this.spawnOrganicSound(freq, (obs.x / canvas.width - 0.5) * 2, 1.0);
            }, delayTime);
        });
    }

    startAuto() {
        const tick = () => {
            if (!isMasterPlaying) return;
            
            const stepInterval = (STEP_4TH_BASE / 2) * audioState.tempoScale;
            this.beatCount++; 

            const isRest = false;

            if (!isRest) {
                if (!audioState.arpeggioMuted) {
                    if (this.beatCount % 2 === 0) {
                        this.currentIdx5 = (this.currentIdx5 + 1) % 5;
                        const freq5 = this.guitar.playNote(this.guitar.notes5[this.currentIdx5], -0.6);
                        if (freq5) {
                            const x = (0.05 + (this.currentIdx5 / 4) * 0.4) * canvas.width;
                            particles.push(new ArpeggioParticle(x, (0.1+Math.random()*0.8)*canvas.height, freq5, GREEN_SET[this.currentIdx5 % 2]));
                        }
                    } else {
                        this.currentIdx7 = (this.currentIdx7 + 1) % 7;
                        const freq7 = this.guitar.playNote(this.guitar.notes7[this.currentIdx7], 0.6);
                        if (freq7) {
                            const x = (0.55 + (this.currentIdx7 / 6) * 0.4) * canvas.width;
                            particles.push(new ArpeggioParticle(x, (0.1+Math.random()*0.8)*canvas.height, freq7, GREEN_SET[2 + (this.currentIdx7 % 2)]));
                        }
                    }
                }
            }

            if (this.beatCount % 2 === 0) {
                const quarterCount = this.beatCount / 2;
                if (quarterCount % 16 === 0) this.guitar.evolve();
                if (quarterCount % 8 === 0 && !audioState.arpeggioMuted) {
                    this.birds.playChirp(this.ctx.currentTime, 1);
                }
                if (quarterCount % 4 === 0 && !audioState.choirMuted) { 
                    const dice = Math.random();
                    if (dice < 0.05) { 
                        const chordBase = Math.random() > 0.5 ? [2, 4, 6, 8] : [1, 3, 5, 7];
                        const chord = chordBase.map(idx => MASTER_SCALE[idx % MASTER_SCALE.length]);
                        this.playChordSequence(chord);
                    } else if (dice < 0.4) { 
                        const midi = MASTER_SCALE[Math.floor(Math.random() * MASTER_SCALE.length)];
                        const freq = 440 * Math.pow(2, (midi - 69) / 12);
                        const obs = createObserverAtRandom(freq);
                        if (obs) this.spawnOrganicSound(freq, (obs.x / canvas.width - 0.5) * 2, 1.0);
                    }
                }
            }
            
            this.tickTimeout = setTimeout(tick, stepInterval);
        };
        tick();
    }

    stopAuto() {
        if (this.tickTimeout) {
            clearTimeout(this.tickTimeout);
            this.tickTimeout = null;
        }
    }
}

/* ── VISUAL ENTITIES ── */

class ArpeggioParticle {
    constructor(x, y, freq, color) {
        this.x = x; this.y = y; this.color = color;
        this.initialR = (4 + (440 / freq) * 3); 
        this.birth = performance.now(); 
        this.decayTime = 2000; 
        this.dead = false;
        this.alpha = 0.7;
    }
    update(now) {
        const progress = (now - this.birth) / this.decayTime;
        if (progress >= 1.0) { this.dead = true; this.alpha = 0; }
        else { this.alpha = 0.7 * (1.0 - progress); }
    }
    draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save(); ctx.globalAlpha = this.alpha;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.initialR, 0, Math.PI * 2);
        ctx.fillStyle = this.color; ctx.fill(); ctx.restore();
    }
}

class Observer {
    constructor(x, y, attackMs, releaseMs) {
        this.x = x; this.y = y; this.bodyR = BASE_BODY_R; 
        this.bodyColor = GREEN_SET[Math.floor(Math.random() * GREEN_SET.length)];
        this.birth = performance.now(); 
        this.life = (attackMs + releaseMs); 
        this.attack = attackMs;
        this.dead = false; this.alpha = 0;
        this.eyeX = 0; this.eyeY = 0;
        this.pupilRelX = 0; this.pupilRelY = 0;
        this.targetEyeX = 0; this.targetEyeY = 0;
        this.targetPupilX = 0; this.targetPupilY = 0;
        this.gazeUpdateInterval = 8 + Math.floor(Math.random() * 4); 
        this.gazeUpdateOffset = Math.floor(Math.random() * 8); 
        this.lastUpdateBeat = -1;
        this.baseAngle = Math.random() * Math.PI * 2;
        this.squish = Math.random() < 0.3 ? (0.88 + Math.random() * 0.08) : 1.0;
    }
    linkTone(freq) {
        this.bodyR = BASE_BODY_R * Math.pow(440 / freq, 0.45);
        this.whiteEyeR = this.bodyR * (68/160); 
        this.pupilR = this.bodyR * (30/160);
        this.eyeLimit = Math.max(0, this.bodyR - this.whiteEyeR); 
        this.pupilLimit = Math.max(0, this.whiteEyeR - this.pupilR);
        this.updateGazeTarget();
    }
    updateGazeTarget() {
        const eyeAngle = this.baseAngle + (Math.random() * 0.6 - 0.3);
        const eyeDist = this.eyeLimit * (0.6 + Math.random() * 0.4); 
        this.targetEyeX = Math.cos(eyeAngle) * eyeDist; 
        this.targetEyeY = Math.sin(eyeAngle) * eyeDist;

        const pupilAngle = eyeAngle + (Math.random() * 0.4 - 0.2);
        const pupilDist = this.pupilLimit * (0.5 + Math.random() * 0.5);
        this.targetPupilX = Math.cos(pupilAngle) * pupilDist;
        this.targetPupilY = Math.sin(pupilAngle) * pupilDist;
    }
    update(now, beatCount) {
        const elapsed = now - this.birth;
        if (elapsed < this.attack) { 
            this.alpha = elapsed / this.attack; 
        }
        else if (elapsed < this.life) { 
            const stayProgress = (elapsed - this.attack) / (this.life - this.attack);
            if (stayProgress < 0.8) {
                this.alpha = 1.0;
            } else {
                this.alpha = 1.0 - (stayProgress - 0.8) / 0.2;
            }
        }
        else { this.dead = true; this.alpha = 0; }

        if ((beatCount + this.gazeUpdateOffset) % this.gazeUpdateInterval === 0 && beatCount !== this.lastUpdateBeat) {
            this.lastUpdateBeat = beatCount;
            this.updateGazeTarget();
        }

        this.eyeX += (this.targetEyeX - this.eyeX) * 0.04;
        this.eyeY += (this.targetEyeY - this.eyeY) * 0.04;
        this.pupilRelX += (this.targetPupilX - this.pupilRelX) * 0.06;
        this.pupilRelY += (this.targetPupilY - this.pupilRelY) * 0.06;
    }
    draw(ctx) {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.scale(1, this.squish);
        ctx.globalAlpha = this.alpha;
        ctx.beginPath(); ctx.arc(0, 0, this.bodyR, 0, Math.PI * 2);
        ctx.fillStyle = this.bodyColor; ctx.fill();
        const eyeAlpha = Math.max(0, (this.alpha - 0.1) / 0.9);
        if (eyeAlpha > 0) {
            ctx.globalAlpha = eyeAlpha * this.alpha;
            ctx.beginPath(); 
            ctx.arc(this.eyeX, this.eyeY, this.whiteEyeR, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE.WHITE; ctx.fill();
            ctx.beginPath(); 
            ctx.arc(this.eyeX + this.pupilRelX, this.eyeY + this.pupilRelY, this.pupilR, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE.BLUE; ctx.fill();
        }
        ctx.restore();
    }
}

        this._updateGazeTargets();

        if (!this.active) return;
        const e = now - this.birth;
        if      (e < this.attack)             this.alpha = e / this.attack;
        else if (e < this.life - this.attack) this.alpha = 1.0;
        else if (e < this.life)               this.alpha = (this.life - e) / this.attack;
        else { this.active = false; this.alpha = 0; return; }
        if ((beatCount + this.gazeOffset) % this.gazeInterval === 0 && beatCount !== this.lastGazeBeat) {
            this.lastGazeBeat = beatCount;
            this._updateGazeTargets();
        }
        this.fPupilX += (this.fTargetPX - this.fPupilX) * 0.06;
        this.fPupilY += (this.fTargetPY - this.fPupilY) * 0.06;
        this.bPupilX += (this.bTargetPX - this.bPupilX) * 0.06;
        this.bPupilY += (this.bTargetPY - this.bPupilY) * 0.06;
    }
    draw(ctx, canvasEl) {
        if (!this.active || !this.ready || this.alpha <= 0) return;
        const drawW = this._getDrawW();
        const drawH = drawW / (1023 / 645);
        const scale = drawW / 1023;
        const drawX = (canvasEl.width - drawW) / 2;
        const drawY = canvasEl.height - drawH * 0.78;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.drawImage(this.img, drawX, drawY, drawW, drawH);
        const eyeAlpha = Math.max(0, (this.alpha - 0.1) / 0.9);
        if (eyeAlpha > 0) {
            ctx.globalAlpha = eyeAlpha * this.alpha;
            // 前キャラクター目：SVG絶対座標(366.5,445) → viewBox相対(223.5, 295)
            const fWhiteR = 103.5 * scale;
            const fPupilR = fWhiteR * (30 / 68);
            const fEyeX = drawX + 223.5 * scale;
            const fEyeY = drawY + 295 * scale;
            ctx.beginPath(); ctx.arc(fEyeX, fEyeY, fWhiteR, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE.WHITE; ctx.fill();
            ctx.beginPath(); ctx.arc(fEyeX + this.fPupilX, fEyeY + this.fPupilY, fPupilR, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE.BLUE; ctx.fill();
            // 後キャラクター目：SVG絶対座標(947.5,485.5) → viewBox相対(804.5, 335.5)
            const bWhiteR = 83.5 * scale;
            const bPupilR = bWhiteR * (30 / 68);
            const bEyeX = drawX + 804.5 * scale;
            const bEyeY = drawY + 335.5 * scale;
            ctx.beginPath(); ctx.arc(bEyeX, bEyeY, bWhiteR, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE.WHITE; ctx.fill();
            ctx.beginPath(); ctx.arc(bEyeX + this.bPupilX, bEyeY + this.bPupilY, bPupilR, 0, Math.PI * 2);
            ctx.fillStyle = PALETTE.BLUE; ctx.fill();
        }
        ctx.restore();
    }
}
const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
let observers = [], particles = [];
const engine = new SanctuaryEngine();

function isColliding(x, y, r) {
    return observers.some(o => Math.hypot(o.x - x, o.y - y) < (o.bodyR + r + MIN_MARGIN));
}

function createObserverAtRandom(freq) {
    const r = BASE_BODY_R * Math.pow(440 / freq, 0.45);
    for(let i=0; i<30; i++) {
        let x = canvas.width * (0.05 + Math.random() * 0.9), y = canvas.height * (0.05 + Math.random() * 0.9);
        if (!isColliding(x, y, r)) {
            const obs = new Observer(x, y, 800, 5200); obs.linkTone(freq);
            observers.push(obs); return obs;
        }
    }
    return null;
}

function render(now) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const beat = engine.beatCount;
    nushi.update(now, beat);
    nushi.draw(ctx, canvas);
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.update(now);
        if (p.dead) { particles.splice(i, 1); } else { p.draw(ctx); }
    }
    for (let i = observers.length - 1; i >= 0; i--) {
        const o = observers[i]; o.update(now, beat);
        if (o.dead) { observers.splice(i, 1); } else { o.draw(ctx); }
    }
    requestAnimationFrame(render);
}

/* ── UI Logic ── */

const nushi = new Nushi();

function spawnNushiSound() {
    const bassScale = [28, 35, 40, 44, 47];
    const count = 3 + Math.floor(Math.random() * 2);
    bassScale.slice(0, count).forEach((midi, i) => {
        setTimeout(() => {
            if (!isMasterPlaying) return;
            const freq = 440 * Math.pow(2, (midi - 69) / 12);
            const dur = 5.0 + Math.random() * 1.5;
            const panner = engine.ctx.createStereoPanner();
            panner.pan.value = (Math.random() - 0.5) * 0.3;
            const localGain = engine.ctx.createGain();
            localGain.gain.value = 2.2;
            localGain.connect(panner).connect(engine.mixerAmb);
            engine.createChoirVoice(freq, engine.ctx.currentTime, dur, localGain);
            engine.createBreath(engine.ctx.currentTime, dur, localGain);
        }, i * 1200);
    });
}

let nushiTimerId = null;
function resetNushiTimer() {
    if (nushiTimerId) clearInterval(nushiTimerId);
    const intervalMs = 8000 * audioState.tempoScale;
    nushiTimerId = setInterval(() => {
        if (!isMasterPlaying || nushi.active) return;
        if (Math.random() < 0.10) { nushi.spawn(); spawnNushiSound(); }
    }, intervalMs);
}
resetNushiTimer();

const elements = {
    overlay: document.getElementById('overlay'),
    startBtn: document.getElementById('start-btn'),
    controls: document.getElementById('header-controls'),
    playbackToggle: document.getElementById('playback-toggle'),
    playbackIcon: document.getElementById('playback-icon'),
    trigger: document.getElementById('settings-trigger'),
    panel: document.getElementById('control-panel'),
    backdrop: document.getElementById('panel-backdrop'),
    vol: document.getElementById('master-vol'),
    volVal: document.getElementById('vol-val'),
    bgInput: document.getElementById('bg-input'),
    bgCont: document.getElementById('bg-container'),
    resetBg: document.getElementById('reset-bg-btn'),
    tempoBtns: document.querySelectorAll('[data-scale]'),
    muteArpeggio: document.getElementById('mute-arpeggio'),
    muteChoir: document.getElementById('mute-choir')
};

window.addEventListener('contextmenu', (e) => { e.preventDefault(); }, false);

function openPanel() {
    elements.panel.classList.add('open');
    elements.backdrop.classList.add('open');
    elements.trigger.classList.add('active');
}

function closePanel() {
    elements.panel.classList.remove('open');
    elements.backdrop.classList.remove('open');
    elements.trigger.classList.remove('active');
}

async function togglePlayback() {
    if (isMasterPlaying) {
        isMasterPlaying = false;
        engine.stopAuto();
        elements.playbackIcon.innerHTML = `<path d="M5 3.5C5 2.7 5.85 2.2 6.54 2.62l12 7a1 1 0 0 1 0 1.76l-12 7C5.85 18.8 5 18.3 5 17.5V3.5Z" fill="white"/>`;
        elements.playbackToggle.classList.remove('playing');
        elements.playbackToggle.style.background = 'var(--color-no)';
    } else {
        await engine.ctx.resume();
        isMasterPlaying = true;
        engine.startAuto();
        elements.playbackIcon.innerHTML = `<rect x="4" y="3" width="5" height="16" rx="2.5" fill="white"/><rect x="13" y="3" width="5" height="16" rx="2.5" fill="white"/>`;
        elements.playbackToggle.classList.add('playing');
        elements.playbackToggle.style.background = 'var(--emerald)';
    }
}

elements.startBtn.onclick = (e) => {
    e.stopPropagation();
    elements.overlay.classList.add('fade-out');
    elements.controls.classList.add('visible');
    isMasterPlaying = true;
    engine.ctx.resume().then(() => {
        engine.startAuto();
        elements.playbackToggle.classList.add('playing');
        elements.playbackToggle.style.background = 'var(--emerald)';
    });
};

elements.playbackToggle.onclick = (e) => {
    e.stopPropagation();
    togglePlayback();
};

elements.tempoBtns.forEach(btn => {
    btn.onclick = (e) => {
        e.stopPropagation();
        const scale = parseFloat(btn.dataset.scale);
        audioState.tempoScale = scale;
        elements.tempoBtns.forEach(b => b.classList.toggle('active', b === btn));
        resetNushiTimer();
    };
});

elements.muteArpeggio.onclick = (e) => {
    e.stopPropagation();
    audioState.arpeggioMuted = !audioState.arpeggioMuted;
    elements.muteArpeggio.classList.toggle('active', audioState.arpeggioMuted);
};

elements.muteChoir.onclick = (e) => {
    e.stopPropagation();
    audioState.choirMuted = !audioState.choirMuted;
    elements.muteChoir.classList.toggle('active', audioState.choirMuted);
};

elements.trigger.onclick = (e) => {
    e.stopPropagation();
    elements.panel.classList.contains('open') ? closePanel() : openPanel();
};

elements.panel.onclick = (e) => { e.stopPropagation(); };

elements.backdrop.onclick = () => { closePanel(); };

elements.resetBg.onclick = (e) => { 
    e.stopPropagation();
    elements.bgCont.style.backgroundImage = 'none'; 
    elements.bgInput.value = ''; 
};

elements.vol.oninput = (e) => {
    const percent = parseFloat(e.target.value);
    elements.volVal.textContent = percent.toFixed(1) + '%';
    const gainValue = percent / 100;
    engine.masterOut.gain.setTargetAtTime(gainValue, engine.ctx.currentTime, 0.1);
};

elements.bgInput.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
            const oc = document.createElement('canvas');
            oc.width = img.naturalWidth;
            oc.height = img.naturalHeight;
            const octx = oc.getContext('2d');
            octx.drawImage(img, 0, 0);
            const sdrUrl = oc.toDataURL('image/jpeg', 0.92);
            elements.bgCont.style.backgroundImage = `url(${sdrUrl})`;
        };
        img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
};

window.addEventListener('touchstart', (e) => {
    if (elements.overlay.offsetParent !== null && !elements.overlay.classList.contains('fade-out')) return;
    
    if (elements.panel.classList.contains('open')) {
        if (!elements.panel.contains(e.target) && !elements.controls.contains(e.target)) {
            closePanel();
            e.preventDefault();
            return;
        }
        return;
    }

    if (elements.controls.contains(e.target) || e.target.closest('.dock') || e.target.closest('#control-panel') || e.target.closest('#panel-backdrop')) {
        return;
    }

    if (!isMasterPlaying) return;

    const t = e.touches[0];
    const midi = MASTER_SCALE[Math.floor(Math.random() * MASTER_SCALE.length)];
    const touchFreq = 440 * Math.pow(2, (midi - 69) / 12);
    const r = BASE_BODY_R * Math.pow(440 / touchFreq, 0.45);

    if (isColliding(t.clientX, t.clientY, r)) return;

    const obs = new Observer(t.clientX, t.clientY, 400, 4000);
    obs.linkTone(touchFreq);
    observers.push(obs);

    const now = engine.ctx.currentTime;
    const panner = engine.ctx.createStereoPanner();
    panner.pan.value = (t.clientX / canvas.width - 0.5) * 2;
    const localGain = engine.ctx.createGain();
    localGain.gain.value = 1.2;
    localGain.connect(panner).connect(engine.mixerAmb);
    engine.createChoirVoice(touchFreq, now, 5.0, localGain);
    engine.createBreath(now, 5.0, localGain);
}, { passive: false });

window.addEventListener('click', (e) => {
    if (elements.overlay.offsetParent !== null && !elements.overlay.classList.contains('fade-out')) return;
    if (elements.panel.classList.contains('open')) return;
    if (e.target.closest('.dock') || e.target.closest('#control-panel') || e.target.closest('#panel-backdrop')) return;
    if (!isMasterPlaying) return;

    const midi = MASTER_SCALE[Math.floor(Math.random() * MASTER_SCALE.length)];
    const touchFreq = 440 * Math.pow(2, (midi - 69) / 12);
    const r = BASE_BODY_R * Math.pow(440 / touchFreq, 0.45);

    if (isColliding(e.clientX, e.clientY, r)) return;

    const obs = new Observer(e.clientX, e.clientY, 400, 4000);
    obs.linkTone(touchFreq);
    observers.push(obs);

    const now = engine.ctx.currentTime;
    const panner = engine.ctx.createStereoPanner();
    panner.pan.value = (e.clientX / canvas.width - 0.5) * 2;
    const localGain = engine.ctx.createGain();
    localGain.gain.value = 1.2;
    localGain.connect(panner).connect(engine.mixerAmb);
    engine.createChoirVoice(touchFreq, now, 5.0, localGain);
    engine.createBreath(now, 5.0, localGain);
});

window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
window.addEventListener('orientationchange', () => {
    setTimeout(() => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }, 150);
});
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

elements.volVal.textContent = INITIAL_UI_PERCENT.toFixed(1) + '%';

requestAnimationFrame(render);
</script>
</body>
</html>
